name: times
description: "Islamic prayer times app — offline-first, Material 3."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^15.1.2
  adhan_dart: ^1.1.2
  shared_preferences: ^2.5.3
  geolocator: ^13.0.4
  geocoding: ^4.0.0
  lat_lng_to_timezone: ^0.2.0
  hijri: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true
