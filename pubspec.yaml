name: times
description: "Islamic prayer times app — offline-first, Material 3."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^15.1.2
  adhan_dart: ^1.1.2
  shared_preferences: ^2.5.3
  geolocator: ^13.0.4
  geocoding: ^4.0.0
  lat_lng_to_timezone: ^0.2.0
  hijri: ^3.0.0
  flutter_qiblah: ^3.1.0+1
  flutter_compass_v2: ^1.0.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  package_info_plus: ^10.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/icon.png
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: assets/branding/icon.png

flutter_native_splash:
  color: "#2E7D32"
  image: assets/branding/icon.png
  android_12:
    color: "#2E7D32"
    image: assets/branding/icon.png
  ios: true
  android: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/icon.png
