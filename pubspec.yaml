name: awqat
description: "Islamic prayer times app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^17.3.0
  adhan_dart: ^2.0.1
  shared_preferences: ^2.5.3
  geolocator: ^14.0.2
  lat_lng_to_timezone: ^0.2.0
  hijri: ^3.0.1
  flutter_qiblah: ^3.2.0
  flutter_compass_v2: ^1.0.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  integration_test:
    sdk: flutter

flutter_native_splash:
  android: true
  ios: true

  image: "assets/app_icon/app_icon_960_foreground.png"

  color: "#000000"

  android_12:
    color: "#000000"

flutter_launcher_icons:
  image_path: "assets/app_icon/app_icon_960.png"

  android: true
  ios: true
  remove_alpha_ios: true

  adaptive_icon_background: "assets/app_icon/app_icon_960_background.png"
  adaptive_icon_foreground: "assets/app_icon/app_icon_960_foreground.png"

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600

    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
